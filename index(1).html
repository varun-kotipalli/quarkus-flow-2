  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- EXECUTION -->\n  <section id=\"execution\" style=\"max-width:1180px; margin:0 auto; padding:clamp(60px,8vw,110px) clamp(20px,5vw,44px);\">\n    <h2 data-reveal=\"0\" style=\"margin:0 0 8px; font-weight:800; font-size:clamp(30px,4.5vw,52px); letter-spacing:-0.035em;\">Hybrid execution<\u002Fh2>\n    <p data-reveal=\"0.03\" style=\"margin:0 0 40px; font-size:18px; color:var(--text2); max-width:62ch;\">Safe work runs in the sandbox. Anything that forks a JVM is handed to your terminal — you run it and paste the output back.<\u002Fp>\n    <div data-stack=\"1fr 1fr\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:stretch;\">\n      <div data-reveal=\"0\" style=\"border:1px solid var(--border); border-radius:16px; background:var(--card); padding:28px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:16px;\">\n          <span style=\"display:inline-flex; width:36px; height:36px; border-radius:10px; align-items:center; justify-content:center; background:var(--card2); border:1px solid var(--border); color:var(--yellow);\">\n            <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"3\"><\u002Frect><path d=\"M8 12l2.5 2.5L16 9\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n          <span style=\"font-size:21px; font-weight:700;\">Sandbox<\u002Fspan>\n          <span style=\"margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--fn);\">automatic<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px; font-size:15px;\">\n          <div style=\"display:flex; gap:10px;\"><span style=\"color:var(--fn);\">●<\u002Fspan> File edits &amp; code rewrites<\u002Fdiv>\n          <div style rne &amp; OpenRewrite recipes<\u002Fdiv>\n          <div style=\"display:flex; gap:10px;\"><span style=\"color:var(--yellow);\">●<\u002Fspan> Quarkus dev-mode &amp; native builds<\u002Fdiv>\n          <div style=\"display:flex; gap:10px;\"><span style=\"color:var(--yellow);\">●<\u002Fspan> You paste the output back<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STACK MAPPING -->\n  <section id=\"stack\" style=\"border-top:1px solid var(--border); background:var(--bg2);\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:clamp(60px,8vw,110px) clamp(20px,5vw,44px);\">\n      <h2 data-reveal=\"0\" style=\"margin:0 0 8px; font-weight:800; font-size:clamp(30px,4.5vw,52px); letter-spacing:-0.035em;\">Built for your stack<\u002Fh2>\n      <p data-reveal=\"0.03\" style=\"margin:0 0 44px; font-size:18px; color:var(--text2); max-width:62ch;\">Quarkus-Flow maps Spring APIs to their Quarkus equivalents across every layer.<\u002Fp>\n      <div data-stack=\"repeat(3,1fr)\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:30px 40px;\">\n        <sc-for list=\"{{ stackGroups }}\" as=\"g\" hint-placeholder-count=\"6\">\n          <div data-reveal=\"0\">\n            <div style=\"font-size:13px; font-weight:700; color:var(--muted); letter-spacing:0.04em; text-transform:uppercase; margin-bottom:15px; padding-bottom:11px; border-bottom:1px solid var(--border);\">{{ g.title }}<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:10px;\">\n              <sc-for list=\"{{ g.items }}\" as=\"m\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:13px;\">\n                  <span style=\"color:var(--text2);\">{{ m.from }}<\u002Fspan>\n                  <span style=\"color:var(--yellow);\">→<\u002Fspan>\n                  <span style=\"color:var(--text);\">{{ m.to }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- INSTALL -->\n  <section id=\"install\" style=\"max-width:760px; margin:0 auto; padding:clamp(60px,8vw,110px) clamp(20px,5vw,44px); text-align:center;\">\n    <h2 data-reveal=\"0\" style=\"margin:0 0 8px; font-weight:800; font-size:clamp(30px,4.5vw,52px); letter-spacing:-0.035em;\">Install Quarkus-Flow<\u002Fh2>\n    <p data-reveal=\"0.03\" style=\"margin:0 0 34px; font-size:18px; color:var(--text2);\">Add the skill from GitHub, then point Claude at a Spring repo.<\u002Fp>\n    <div data-reveal=\"0.05\" style=\"text-align:left; border:1px solid var(--border2); border-radius:18px; background:var(--card); padding:16px; box-shadow:0 24px 60px rgba(0,0,0,0.5);\">\n      <div style=\"display:flex; gap:4px; margin-bottom:8px;\">\n        <sc-for list=\"{{ itabs }}\" as=\"it\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ it.onClick }}\" style=\"padding:9px 18px; border-radius:999px; border:none; background:{{ it.bg }}; color:{{ it.color }}; font-family:'JetBrains Mono',monospace; font-size:13.5px; font-weight:600; cursor:pointer;\">{{ it.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"padding:16px 12px; font-family:'JetBrains Mono',monospace; font-size:14px; line-height:1.9; min-height:120px;\">\n        <sc-if value=\"{{ showI0 }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"color:var(--com);\"># clone into your Claude skills directory<\u002Fdiv>\n          <div><span style=\"color:var(--fn);\">$<\u002Fspan> git clone \\<\u002Fdiv>\n          <div style=\"padding-left:16px; color:var(--text);\">https://github.com/&lt;org&gt;/quarkus-flow \\<\u002Fdiv>\n          <div style=\"padding-left:16px; color:var(--text);\">~/.claude/skills/quarkus-flow<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showI1 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"color:var(--com);\"># add as a git submodule<\u002Fdiv>\n          <div><span style=\"color:var(--fn);\">$<\u002Fspan> git submodule add \\<\u002Fdiv>\n          <div style=\"padding-left:16px; color:var(--text);\">https://github.com/&lt;org&gt;/quarkus-flow \\<\u002Fdiv>\n          <div style=\"padding-left:16px; color:var(--text);\">.claude/skills/quarkus-flow<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showI2 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"color:var(--com);\"># or download &amp; drop the folder in<\u002Fdiv>\n          <div><span style=\"color:var(--fn);\">$<\u002Fspan> curl -L github.com/&lt;org&gt;/quarkus-flow/archive/main.tar.gz \\<\u002Fdiv>\n          <div style=\"padding-left:16px; color:var(--text);\">| tar -xz -C ~/.claude/skills/<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid var(--border); margin:4px -4px 0; padding:16px 12px 6px; font-size:15px; color:var(--text2);\">\n        Then, in Claude: <span style=\"color:var(--text); font-weight:600;\">“Migrate this Spring repo to Quarkus using Quarkus-Flow.”<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p data-reveal=\"0.07\" style=\"margin:20px 0 0; font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--yellow);\">⚠ one-command install is on the way<\u002Fp>\n    <div data-reveal=\"0.09\" style=\"display:flex; flex-wrap:wrap; gap:12px 24px; justify-content:center; margin-top:28px; font-size:15px; color:var(--text2);\">\n      <span style=\"display:inline-flex; align-items:center; gap:8px;\"><span style=\"color:var(--fn);\">✓<\u002Fspan> Open source<\u002Fspan>\n      <span style=\"display:inline-flex; align-items:center; gap:8px;\"><span style=\"color:var(--fn);\">✓<\u002Fspan> Claude-compatible<\u002Fspan>\n      <span style=\"display:inline-flex; align-items:center; gap:8px;\"><span style=\"color:var(--fn);\">✓<\u002Fspan> Deterministic &amp; PR-ready<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"border-top:1px solid var(--border);\">\n    <div data-stack=\"1.5fr 1fr 1fr 1fr\" style=\"max-width:1180px; margin:0 auto; padding:56px clamp(20px,5vw,44px) 34px; display:grid; grid-template-columns:1.5fr 1fr 1fr 1fr; gap:32px;\">\n      <div>\n        <a href=\"#top\" style=\"display:flex; align-items:center; gap:11px; margin-bottom:16px;\">\n          <svg width=\"30\" height=\"30\" viewBox=\"0 0 48 48\" aria-hidden=\"true\" style=\"display:block;\">\n            <rect x=\"2\" y=\"2\" width=\"44\" height=\"44\" rx=\"11\" fill=\"#4695EB\"><\u002Frect>\n            <polygon points=\"24,9 11,17.5 24,24\" fill=\"#E4322B\"><\u002Fpolygon>\n            <polygon points=\"24,9 37,17.5 24,24\" fill=\"#ffffff\"><\u002Fpolygon>\n            <polygon points=\"11,17.5 24,24 24,39\" fill=\"#ffffff\"><\u002Fpolygon>\n            <polygon points=\"37,17.5 24,24 24,39\" fill=\"#E4322B\"><\u002Fpolygon>\n            <circle cx=\"24\" cy=\"24\" r=\"2.7\" fill=\"#10457E\"><\u002Fcircle>\n          <\u002Fsvg>\n          <span style=\"font-family:'Titillium Web',sans-serif; font-weight:300; font-size:19px; letter-spacing:0.08em;\">Quarkus-Flow<\u002Fspan>\n        <\u002Fa>\n        <p style=\"margin:0; max-width:32ch; font-size:14px; line-height:1.6; color:var(--text2);\">A Claude skill for governed, validated Spring&nbsp;Boot → Quarkus migration.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:14px;\">Product<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px; font-size:14px; color:var(--text2);\">\n          <a href=\"#features\" style-hover=\"color:var(--text);\">Features<\u002Fa>\n          <a href=\"#steps\" style-hover=\"color:var(--text);\">How it works<\u002Fa>\n          <a href=\"#execution\" style-hover=\"color:var(--text);\">Hybrid execution<\u002Fa>\n          <a href=\"#stack\" style-hover=\"color:var(--text);\">Stack mapping<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:14px;\">The skill<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px; font-size:14px; color:var(--text2);\">\n          <div>8 orchestrated steps<\u002Fdiv>\n          <div>80 validation checkpoints<\u002Fdiv>\n          <div>2 execution modes<\u002Fdiv>\n          <a href=\"#install\" style-hover=\"color:var(--text);\">Install<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:14px;\">Community<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px; font-size:14px; color:var(--text2);\">\n          <a href=\"https://github.com\" style-hover=\"color:var(--text);\">GitHub<\u002Fa>\n          <a href=\"https://github.com\" style-hover=\"color:var(--text);\">Issues<\u002Fa>\n          <a href=\"https://github.com\" style-hover=\"color:var(--text);\">Discussions<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid var(--border);\">\n      <div style=\"max-width:1180px; margin:0 auto; padding:18px clamp(20px,5vw,44px); display:flex; flex-wrap:wrap; gap:12px; justify-content:space-between; font-size:12.5px; color:var(--muted);\">\n        <span>Quarkus-Flow — a Claude skill · design inspired by duckdb.org<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;\">Spring → Quarkus<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:760}}\">\nclass Component extends DCLogic {\n  state = { tab: 0, itab: 0 };\n\n  renderVals() {\n    const tabLabels = ['detect', 'analyze', 'validate', 'migrate'];\n    const tabs = tabLabels.map((label, i) => ({\n      label,\n      bg: this.state.tab === i ? 'var(--card2)' : 'transparent',\n      color: this.state.tab === i ? 'var(--text)' : 'var(--muted)',\n      onClick: () => this.setState({ tab: i }),\n    }));\n    const itabLabels = ['Claude Code', 'Submodule', 'Download'];\n    const itabs = itabLabels.map((label, i) => ({\n      label,\n      bg: this.state.itab === i ? 'var(--card2)' : 'transparent',\n      color: this.state.itab === i ? 'var(--text)' : 'var(--muted)',\n      onClick: () => this.setState({ itab: i }),\n    }));\n    const scenarioLabel = ['repo scan', 'migration plan', '80 checkpoints', 'apply + PR'][this.state.tab];\n\n    const flagStyles = {\n      PAUSE:    { flagBg: 'rgba(96,165,250,0.14)', flagColor: '#93c5fd', flagBorder: 'rgba(96,165,250,0.35)' },\n      OPTIONAL: { flagBg: 'rgba(255,255,255,0.06)', flagColor: '#a6a6ae', flagBorder: 'rgba(255,255,255,0.16)' },\n      GATE:     { flagBg: 'rgba(255,240,0,0.13)', flagColor: '#e6d800', flagBorder: 'rgba(255,240,0,0.35)' },\n    };\n    const rawSteps = [\n      { title: 'Detect', desc: 'Fingerprint the Spring Boot version, build system, module layout, and framework surface.', cmd: 'scan → spring-boot 2.7.x · maven · 3 modules' },\n      { title: 'Analyze', desc: 'Map dependencies and API usage into a plan, then pause for your review before touching code.', cmd: 'plan → 142 changes across 38 files', flag: 'PAUSE' },\n      { title: 'Setup', desc: 'Scaffold the Quarkus project: BOM, build plugins, base configuration, directory structure.', cmd: 'scaffold quarkus 3.x · bom · plugins' },\n      { title: 'Mechanical', desc: 'Optional bulk API rewrites via OpenRewrite / Moderne recipes. Skipped by default.', cmd: 'rewrite --recipes (optional · skipped)', flag: 'OPTIONAL' },\n      { title: 'Platform layer', desc: 'Org-specific migrations: AWS, internal chassis libraries, REST port filters, YAML → properties, Dockerfile.', cmd: 'apply platform → aws · chassis · rest · yaml' },\n      { title: 'Tests', desc: 'Gate: baseline the existing suite, migrate the tests, re-run. Nothing proceeds until green.', cmd: 'mvn test → baseline · migrate · re-run ✓', flag: 'GATE' },\n      { title: 'Pipeline', desc: 'Convert CI/CD pipeline definitions to build, test, and package the Quarkus app.', cmd: 'convert pipeline → quarkus build' },\n      { title: 'Pull request', desc: 'Open a PR with the full diff, a change summary, and the checkpoint report, then pause.', cmd: 'gh pr create → ready for review', flag: 'PAUSE' },\n    ];\n    const steps = rawSteps.map((s, i) => ({\n      n: String(i + 1).padStart(2, '0'),\n      title: s.title, desc: s.desc, cmd: s.cmd,\n      flag: s.flag || false,\n      ...(s.flag ? flagStyles[s.flag] : { flagBg: '', flagColor: '', flagBorder: '' }),\n    }));\n\n    const ic = (p) => `<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">${p}<\u002Fsvg>`;\n    const heroCards = [\n      { title: 'What it migrates', icon: ic('<path d=\"M20.5 11H19V7a2 2 0 0 0-2-2h-4V3.5a2.5 2.5 0 0 0-5 0V5H4a2 2 0 0 0-2 2v3.8h1.5a2.2 2.2 0 1 1 0 4.4H2V19a2 2 0 0 0 2 2h3.8v-1.5a2.2 2.2 0 1 1 4.4 0V21H17a2 2 0 0 0 2-2v-4h1.5a2.5 2.5 0 0 0 0-5z\"/>'), chips: ['REST', 'Config', 'JPA', 'Health', 'Platform', '…'] },\n      { title: 'Where it runs', icon: ic('<rect x=\"2\" y=\"4\" width=\"20\" height=\"6\" rx=\"2\"/><rect x=\"2\" y=\"14\" width=\"20\" height=\"6\" rx=\"2\"/><path d=\"M6 7h.01M6 17h.01\"/>'), chips: ['Sandbox', 'Terminal'] },\n      { title: 'What you ship', icon: ic('<circle cx=\"6\" cy=\"6\" r=\"3\"/><circle cx=\"6\" cy=\"18\" r=\"3\"/><circle cx=\"18\" cy=\"18\" r=\"3\"/><path d=\"M6 9v6\"/><path d=\"M18 15V9a3 3 0 0 0-3-3H9\"/>'), chips: ['Diff', 'Summary', '80 checks'] },\n    ];\n    const features = [\n      { title: 'Governed', desc: '8 steps with defined jobs, review pauses, and a test gate — nothing runs ahead of validation.', icon: ic('<path d=\"M4 6h16\"/><path d=\"M4 12h16\"/><path d=\"M4 18h10\"/>') },\n      { title: 'Immutable', desc: '80 checkpoints graded on every run. They can\\u2019t be skipped, weakened, or edited.', icon: ic('<path d=\"M12 3l7 3v6c0 4-3 7-7 9-4-2-7-5-7-9V6z\"/><path d=\"M9 12l2 2 4-4\"/>') },\n      { title: 'Self-healing', desc: 'Each failure maps to a known symptom and fix. The loop applies it, then re-validates.', icon: ic('<path d=\"M21 12a9 9 0 1 1-3-6.7\"/><path d=\"M21 3v5h-5\"/>') },\n      { title: 'Hybrid', desc: 'Safe work runs in the sandbox; JVM builds are handed to your terminal with the exact command.', icon: ic('<rect x=\"2\" y=\"4\" width=\"20\" height=\"16\" rx=\"2\"/><path d=\"M6 9l3 3-3 3\"/><path d=\"M13 15h4\"/>') },\n      { title: 'Mapped', desc: 'Spring APIs mapped to Quarkus equivalents: REST, config, persistence, health, and more.', icon: ic('<path d=\"M3 12h18\"/><path d=\"M12 3v18\"/><circle cx=\"12\" cy=\"12\" r=\"9\"/>') },\n      { title: 'PR-ready', desc: 'Ends in a pull request with the full diff, a change summary, and the checkpoint report.', icon: ic('<circle cx=\"6\" cy=\"6\" r=\"3\"/><circle cx=\"6\" cy=\"18\" r=\"3\"/><circle cx=\"18\" cy=\"18\" r=\"3\"/><path d=\"M6 9v6\"/><path d=\"M18 15V9a3 3 0 0 0-3-3H9\"/>') },\n    ];\n\n    const stackGroups = [\n      { title: 'REST layer', items: [ { from: '@RestController', to: 'JAX-RS' }, { from: 'RestTemplate', to: 'REST Client' }, { from: 'port filters', to: 'JAX-RS filters' } ] },\n      { title: 'Config', items: [ { from: '@Value', to: '@ConfigProperty' }, { from: 'application.yml', to: '.properties' }, { from: 'profiles', to: '%profile' } ] },\n      { title: 'Persistence', items: [ { from: 'Spring Data JPA', to: 'Panache' }, { from: '@Repository', to: '@AppScoped' }, { from: 'javax.*', to: 'jakarta.*' } ] },\n      { title: 'Observability', items: [ { from: 'Actuator', to: 'SmallRye Health' }, { from: 'Micrometer', to: 'Micrometer ext' }, { from: 'logback', to: 'quarkus-logging' } ] },\n      { title: 'Build', items: [ { from: 'boot plugin', to: 'quarkus plugin' }, { from: 'starters', to: 'extensions' }, { from: 'fat jar', to: 'fast-jar' } ] },\n      { title: 'Platform', items: [ { from: 'AWS SDK', to: 'quarkus-amazon' }, { from: 'chassis libs', to: 'mapped' }, { from: 'Dockerfile', to: 'src/main/docker' } ] },\n    ];\n\n    return {\n      tabs, itabs, scenarioLabel, steps, features, heroCards, stackGroups,\n      show0: this.state.tab === 0, show1: this.state.tab === 1, show2: this.state.tab === 2, show3: this.state.tab === 3,\n      showI0: this.state.itab === 0, showI1: this.state.itab === 1, showI2: this.state.itab === 2,\n      setRoot: (el) => { this.root = el; },\n    };\n  }\n\n  componentDidMount() {\n    const scope = this.root || document;\n\n    const els = Array.from(scope.querySelectorAll('[data-reveal]'));\n    if ('IntersectionObserver' in window && els.length) {\n      els.forEach((el) => {\n        const delay = parseFloat(el.getAttribute('data-reveal')) || 0;\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(20px)';\n        el.style.transition = `opacity .6s cubic-bezier(.22,.61,.36,1) ${delay}s, transform .6s cubic-bezier(.22,.61,.36,1) ${delay}s`;\n      });\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) { e.target.style.opacity = '1'; e.target.style.transform = 'translateY(0)'; io.unobserve(e.target); }\n        });\n      }, { threshold: 0.1, rootMargin: '0px 0px -8% 0px' });\n      els.forEach((el) => io.observe(el));\n    }\n\n    scope.querySelectorAll('[data-html]').forEach((el) => {\n      const html = el.getAttribute('data-html');\n      if (html && html.indexOf('{{') === -1) el.innerHTML = html;\n    });\n\n    const nav = scope.querySelector('[data-navlinks]');\n    const stacks = Array.from(scope.querySelectorAll('[data-stack]'));\n    const apply = () => {\n      const w = window.innerWidth;\n      if (nav) nav.style.display = w > 900 ? 'flex' : 'none';\n      stacks.forEach((el) => {\n        const full = el.getAttribute('data-stack');\n        if (w > 900) el.style.gridTemplateColumns = full;\n        else if (w > 620 && /repeat\\(([346]),/.test(full)) el.style.gridTemplateColumns = 'repeat(2,1fr)';\n        else el.style.gridTemplateColumns = '1fr';\n      });\n    };\n    apply();\n    window.addEventListener('resize', apply);\n    this._apply = apply;\n  }\n\n  componentWillUnmount() {\n    if (this._apply) window.removeEventListener('resize', this._apply);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
